<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>API Étudiants</title>
    </head>
    <body>
        <h1>Bienvenue </h1>
        <div class="container mt-5">
            <h2 class="mb-4">Liste des étudiants</h2>

    <section class="card p-4 mb-5 shadow-sm">
        <form id="userForm">
            <div class="row g-3">
                    <div class="col-md-5">
                        <input type="text" id="nom" class="form-control" placeholder="Nom" required>
                    </div>
                        <div class="col-md-5">
                            <input type="text" id="prenom" class="form-control" placeholder="Prénom" required>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Ajouter</button>
                        </div>
                    </div>
                </form>
            </section>

            <section>
                <h4>Liste des inscrits</h4>
                <ul id="userList" class="list-group">
                </ul>
            </section>
        </div>   
    </body>
</html>
